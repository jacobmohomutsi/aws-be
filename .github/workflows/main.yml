name: 🚀 Deploy Backend (ZIP) to Elastic Beanstalk
on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_NAME: aws-be
      ENV_NAME: Aws-be-env
      AWS_REGION: eu-north-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # 🔐 AWS Auth
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::097300397772:role/github-agent
          aws-region: ${{ env.AWS_REGION }}
      # 📦 Create deployment package
      - name: Create ZIP
        run: zip -r app.zip . -x "*.git*"
      # 🚀 Deploy ZIP directly
      - name: Deploy
        uses: aws-actions/aws-elasticbeanstalk-deploy@v1.0.0
        with:
          application-name: ${{ env.APP_NAME }}
          environment-name: ${{ env.ENV_NAME }}
          version-label: ${{ github.sha }}
          aws-region: ${{ env.AWS_REGION }}
          deployment-package-path: app.zip
